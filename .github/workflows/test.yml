name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: domínio (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Sem dependências: a suíte usa só o test runner nativo do Node.
      - name: Rodar testes
        run: npm test
