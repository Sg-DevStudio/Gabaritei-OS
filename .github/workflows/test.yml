name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: domínio (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Gate de sintaxe para scripts do navegador, service workers e Functions.
      - name: Checar sintaxe (node --check)
        run: |
          for f in js/app.js js/domain.js js/store.js js/sync.js js/timer.js js/charts.js js/frases.js js/firebase-sync.js sw.js firebase-messaging-sw.js functions/index.js; do
            node --check "$f"
          done
      # Sem dependências: a suíte usa só o test runner nativo do Node.
      - name: Rodar testes
        run: npm test
