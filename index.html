  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // havia um SW controlando esta aba? se sim, uma troca de controller
        // significa ATUALIZAÇÃO — recarregamos uma vez para pegar a versão nova.
        // (na 1ª instalação não há controller, então não recarrega à toa).
        var tinhaControle = !!navigator.serviceWorker.controller;
        var recarregando = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (!tinhaControle || recarregando) return;
          recarregando = true;
          window.location.reload();
        });
        navigator.serviceWorker.register('sw.js').catch(function () { /* app funciona sem SW */ });
      });
    }
  </script>
