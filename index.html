<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F8F6">
  <meta name="description" content="Sistema pessoal de gestão de estudos para concursos — cronograma, sessões, revisões 24h/7d/30d e estatísticas contra a meta de corte.">
  <title>Estudos — Plataforma de Concursos</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icone.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icone-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar (desktop) -->
    <nav id="sidebar" aria-label="Navegação principal">
      <div class="marca">
        <span class="marca-bolha" aria-hidden="true"></span>
        <span class="marca-nome">Estudos</span>
      </div>
      <a href="#hoje" data-rota="hoje" class="nav-item">Hoje</a>
      <a href="#timer" data-rota="timer" class="nav-item">Timer</a>
      <a href="#revisoes" data-rota="revisoes" class="nav-item">Revisões <span id="badge-revisoes" class="badge oculto"></span></a>
      <a href="#edital" data-rota="edital" class="nav-item">Edital</a>
      <a href="#simulados" data-rota="simulados" class="nav-item">Simulados</a>
      <a href="#stats" data-rota="stats" class="nav-item">Estatísticas</a>
      <a href="#historico" data-rota="historico" class="nav-item">Histórico</a>
      <a href="#ajustes" data-rota="ajustes" class="nav-item">Plano e backup</a>
      <div class="sidebar-rodape">
        <div id="sidebar-concurso" class="sidebar-concurso"></div>
      </div>
    </nav>

    <!-- Conteúdo -->
    <main id="conteudo" tabindex="-1"></main>

    <!-- Abas (mobile) -->
    <nav id="abas" aria-label="Navegação principal (celular)">
      <a href="#hoje" data-rota="hoje" class="aba">Hoje</a>
      <a href="#timer" data-rota="timer" class="aba">Timer</a>
      <a href="#revisoes" data-rota="revisoes" class="aba">Revisões<span id="badge-revisoes-m" class="badge-ponto oculto"></span></a>
      <a href="#stats" data-rota="stats" class="aba">Estat.</a>
      <a href="#mais" data-rota="mais" class="aba">Mais</a>
    </nav>
  </div>

  <div id="modal-raiz"></div>
  <div id="toast-raiz" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <script src="js/frases.js"></script>
  <script src="js/domain.js"></script>
  <script src="js/store.js"></script>
  <script src="js/sync.js"></script>
  <script type="module" src="js/firebase-sync.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () { /* app funciona sem SW */ });
      });
    }
  </script>
</body>
</html>
